# ============================================================
#  NEXUS OS — Hyprland Configuration
#  ~/.config/hypr/hyprland.conf
# ============================================================

# ── MONITORS ─────────────────────────────────────────────────
# Auto-detect all monitors
monitor=,preferred,auto,1

# ── AUTOSTART ────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── ENVIRONMENT ──────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1

# ── GENERAL ──────────────────────────────────────────────────
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(00c8f0ff) rgba(00ff9dff) 45deg
  col.inactive_border = rgba(1a3040ff)
  layout = dwindle
  resize_on_border = true
}

# ── DECORATION ───────────────────────────────────────────────
decoration {
  rounding = 6
  active_opacity = 1.0
  inactive_opacity = 0.92

  blur {
    enabled = true
    size = 8
    passes = 2
    vibrancy = 0.2
    new_optimizations = true
  }

  drop_shadow = true
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(00c8f030)
}

# ── ANIMATIONS ───────────────────────────────────────────────
animations {
  enabled = true

  bezier = nexusCurve, 0.05, 0.9, 0.1, 1.05
  bezier = linear, 0.0, 0.0, 1.0, 1.0
  bezier = easeOut, 0.0, 0.0, 0.2, 1.0

  animation = windows, 1, 5, nexusCurve
  animation = windowsOut, 1, 4, easeOut, popin 80%
  animation = border, 1, 10, linear
  animation = borderangle, 1, 80, linear, loop
  animation = fade, 1, 5, easeOut
  animation = workspaces, 1, 5, nexusCurve, slidevert
}

# ── LAYOUTS ──────────────────────────────────────────────────
dwindle {
  pseudotile = true
  preserve_split = true
  smart_split = true
}

master {
  new_is_master = false
  mfact = 0.5
}

# ── INPUT ────────────────────────────────────────────────────
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
  touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
  }
}

gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
  workspace_swipe_distance = 300
}

# ── MISC ─────────────────────────────────────────────────────
misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  animate_manual_resizes = true
}

# ── WINDOW RULES ─────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(imv)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 900 600, class:^(kitty)$, title:^(float)$
windowrulev2 = center, class:^(kitty)$, title:^(float)$
windowrulev2 = float, class:^(kitty)$, title:^(float)$

# Opacity rules
windowrulev2 = opacity 0.92 0.85, class:^(kitty)$
windowrulev2 = opacity 0.95 0.9, class:^(obsidian)$

# Workspace assignments
windowrulev2 = workspace 1, class:^(firefox)$
windowrulev2 = workspace 1, class:^(brave-browser)$
windowrulev2 = workspace 2, class:^(kitty)$
windowrulev2 = workspace 3, class:^(obsidian)$
windowrulev2 = workspace 4, class:^(vesktop)$

# ── KEYBINDS ─────────────────────────────────────────────────
$mod = SUPER
$terminal = kitty
$browser = brave
$launcher = rofi -show drun -theme ~/.config/rofi/nexus.rasi
$filemanager = thunar

# Core
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, E, exec, $filemanager
bind = $mod, Space, exec, $launcher
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
bind = $mod, P, pseudo
bind = $mod, B, exec, $browser

# Float terminal
bind = $mod SHIFT, Return, exec, kitty --title float

# Screenshots
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy

# Clipboard history
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Lock screen
bind = $mod, L, exec, hyprlock

# Move focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize
binde = $mod ALT, H, resizeactive, -40 0
binde = $mod ALT, L, resizeactive, 40 0
binde = $mod ALT, K, resizeactive, 0 -40
binde = $mod ALT, J, resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
