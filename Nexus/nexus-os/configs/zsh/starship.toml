# ============================================================
#  NEXUS OS — Starship Prompt Configuration
#  ~/.config/starship/starship.toml
# ============================================================

format = """
[╭─](bold #1a3040)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
[╰─](bold #1a3040)\
$character"""

# ── OS ICON ──────────────────────────────────────────────────
[os]
disabled = false
style = "bold #00c8f0"

[os.symbols]
Arch = " "
Linux = " "

# ── USER ─────────────────────────────────────────────────────
[username]
show_always = false
style_user = "bold #00ff9d"
style_root = "bold #ff4060"
format = "[$user]($style)[@]( #4a7090)"

[hostname]
ssh_only = true
style = "bold #00c8f0"
format = "[$hostname]($style) "

# ── DIRECTORY ────────────────────────────────────────────────
[directory]
style = "bold #00c8f0"
format = "[ $path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "#ff4060"

[directory.substitutions]
"~" = "󰋜 ~"
"Documents" = "󰈙"
"Downloads" = "󰇚"
"Pictures" = "󰋩"
"Music" = "󰎜"

# ── GIT ──────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold #f0c000"
format = "[on $symbol$branch]($style) "

[git_status]
style = "bold #ff4060"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰏗"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ── LANGUAGES ────────────────────────────────────────────────
[python]
symbol = " "
style = "bold #00ff9d"
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = " "
style = "bold #00ff9d"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold #ff4060"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold #00c8f0"
format = "[$symbol($version )]($style)"

# ── CMD DURATION ─────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style = "bold #f0c000"
format = "[ $duration]($style) "

# ── CHARACTER ────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #00ff9d)"
error_symbol = "[❯](bold #ff4060)"
vimcmd_symbol = "[❮](bold #00c8f0)"
